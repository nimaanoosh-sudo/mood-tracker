<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#5c6bc0">
  <meta name="description" content="Track your daily mood with notes and charts">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Mood Tracker</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Mood Tracker</h1>
      <p class="current-date" id="currentDate"></p>
    </header>

    <section class="today-section card">
      <h2>How are you feeling today?</h2>
      <div class="mood-buttons" id="moodButtons">
        <button data-mood="1" class="mood-btn"><span class="emoji">😩</span><span class="label">Awful</span></button>
        <button data-mood="2" class="mood-btn"><span class="emoji">😟</span><span class="label">Bad</span></button>
        <button data-mood="3" class="mood-btn"><span class="emoji">😐</span><span class="label">Okay</span></button>
        <button data-mood="4" class="mood-btn"><span class="emoji">🙂</span><span class="label">Good</span></button>
        <button data-mood="5" class="mood-btn"><span class="emoji">😄</span><span class="label">Great</span></button>
      </div>
      <textarea id="noteInput" placeholder="Add a note (optional)..." rows="3" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
      <button id="saveBtn" class="save-btn" disabled>Save</button>
    </section>

    <section class="history-section card">
      <h2>Past Entries</h2>
      <div id="historyList" class="history-list"></div>
    </section>

    <section class="chart-section card">
      <div class="chart-header">
        <button id="prevMonth" class="nav-btn">&lsaquo;</button>
        <h2 id="chartMonth"></h2>
        <button id="nextMonth" class="nav-btn">&rsaquo;</button>
      </div>
      <div class="chart-types">
        <button class="chart-type-btn active" data-chart="bar">Column</button>
        <button class="chart-type-btn" data-chart="line">Line</button>
      </div>
      <canvas id="moodChart"></canvas>
    </section>
  </div>
  <footer class="footer">made by &lt;/neo&gt; in just 1h for 'Sharareh'</footer>
  <div class="flower-overlay" id="flowerOverlay"></div>
  <script src="js/app.js?v=4"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js?v=2');
    }
  </script>
</body>
</html>
